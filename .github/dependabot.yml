version: 2
updates:
  - package-ecosystem: npm
    directories: [/sdk-js, /mcp]
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: [minor, patch]
  - package-ecosystem: pip
    directory: /sdk-python
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
